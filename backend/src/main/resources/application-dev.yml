spring:
  datasource:
    url: jdbc:h2:mem:padeldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY,VALUE,USER
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate # Flyway es la única fuente del esquema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# Defaults SOLO para desarrollo local (no producción). Sobreescribir siempre vía variable de entorno.
jwt:
  secret: ${JWT_SECRET:dev-only-local-secret-do-not-use-in-production-1234567890}

mercadopago:
  access-token: ${MP_ACCESS_TOKEN:TEST-0000000000000000-000000-0000000000000000000000000000000-000000000}
