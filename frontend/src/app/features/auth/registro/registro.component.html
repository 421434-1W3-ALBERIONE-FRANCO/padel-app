<div class="min-height-screen flex items-center justify-center p-4 md:p-8 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
  <div class="w-full max-w-xl">
    
    <!-- Logo / Brand Header -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-tr from-primary-500 to-emerald-400 shadow-lg shadow-primary-500/20 mb-3 animate-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7 text-slate-950">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 0 0 .495-7.467 5.99 5.99 0 0 0-1.925 3.546 5.974 5.974 0 0 1-2.133-1A3.75 3.75 0 0 0 12 18Z" />
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold tracking-tight text-white sm:text-3xl">
        Crear Cuenta en PadelApp
      </h1>
      <p class="mt-1 text-xs text-slate-400">
        Registrate para reservar canchas y comprar bonos
      </p>
    </div>

    <!-- Feedback Banners -->
    <div *ngIf="errorMessage()" 
         class="mb-4 p-4 rounded-xl bg-red-950/50 border border-red-800 text-red-200 text-xs flex items-start space-x-3 shadow-lg"
         id="registro-error-banner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 text-red-400 shrink-0 mt-0.5">
        <path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.401 3.003ZM12 8.25a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V9a.75.75 0 0 1 .75-.75Zm0 8.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd" />
      </svg>
      <span>{{ errorMessage() }}</span>
    </div>

    <div *ngIf="successMessage()" 
         class="mb-4 p-4 rounded-xl bg-primary-950/50 border border-primary-800 text-primary-200 text-xs flex items-start space-x-3 shadow-lg"
         id="registro-success-banner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 text-primary-400 shrink-0 mt-0.5">
        <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm13.36-1.814a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.748-5.25Z" clip-rule="evenodd" />
      </svg>
      <span>{{ successMessage() }}</span>
    </div>

    <!-- Register Card -->
    <div class="backdrop-blur-md bg-slate-900/60 border border-slate-800/80 rounded-3xl p-6 sm:p-8 shadow-2xl">
      
      <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <!-- Nombre & Apellido Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="nombre" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nombre</label>
            <input
              id="nombre"
              type="text"
              formControlName="nombre"
              placeholder="Juan"
              class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-2.5 px-4 text-sm transition duration-200 outline-none"
              [class.border-red-500]="isFieldInvalid('nombre')"
            />
            <p *ngIf="isFieldInvalid('nombre')" class="mt-1 text-xs text-red-400">El nombre es obligatorio.</p>
          </div>

          <div>
            <label for="apellido" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Apellido</label>
            <input
              id="apellido"
              type="text"
              formControlName="apellido"
              placeholder="Pérez"
              class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-2.5 px-4 text-sm transition duration-200 outline-none"
              [class.border-red-500]="isFieldInvalid('apellido')"
            />
            <p *ngIf="isFieldInvalid('apellido')" class="mt-1 text-xs text-red-400">El apellido es obligatorio.</p>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="juan.perez@ejemplo.com"
            class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-2.5 px-4 text-sm transition duration-200 outline-none"
            [class.border-red-500]="isFieldInvalid('email')"
          />
          <p *ngIf="isFieldInvalid('email')" class="mt-1 text-xs text-red-400">Debe ingresar un email válido.</p>
        </div>

        <!-- Teléfono & Rol Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="telefono" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Teléfono</label>
            <input
              id="telefono"
              type="text"
              formControlName="telefono"
              placeholder="+54 9 11 1234 5678"
              class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-2.5 px-4 text-sm transition duration-200 outline-none"
              [class.border-red-500]="isFieldInvalid('telefono')"
            />
          </div>

          <div>
            <label for="rol" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Rol (Prueba)</label>
            <select
              id="rol"
              formControlName="rol"
              class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-2.5 px-4 text-sm transition duration-200 outline-none cursor-pointer"
            >
              <option value="JUGADOR" class="bg-slate-950 text-white">JUGADOR</option>
              <option value="RECEPCIONISTA" class="bg-slate-950 text-white">RECEPCIONISTA</option>
              <option value="ADMIN" class="bg-slate-950 text-white">ADMIN</option>
            </select>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Contraseña</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-2.5 px-4 text-sm transition duration-200 outline-none"
            [class.border-red-500]="isFieldInvalid('password')"
          />
          <p *ngIf="isFieldInvalid('password')" class="mt-1 text-xs text-red-400 font-medium">La contraseña debe tener al menos 6 caracteres.</p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full relative flex items-center justify-center py-3.5 px-4 rounded-xl text-slate-950 font-bold bg-gradient-to-r from-primary-400 to-emerald-400 hover:from-primary-300 hover:to-emerald-300 active:scale-98 transition duration-200 disabled:opacity-50 disabled:scale-100 disabled:cursor-not-allowed shadow-lg shadow-primary-500/10 mt-6 cursor-pointer"
        >
          <span *ngIf="!isLoading()">Registrarse</span>
          <span *ngIf="isLoading()" class="flex items-center space-x-2">
            <svg class="animate-spin h-5 w-5 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Procesando...</span>
          </span>
        </button>

      </form>

      <!-- Navigation Link -->
      <div class="mt-6 text-center">
        <p class="text-xs text-slate-400">
          ¿Ya tenés cuenta? 
          <a routerLink="/auth/login" class="text-primary-400 hover:text-primary-300 hover:underline font-semibold transition duration-150 cursor-pointer">
            Iniciá sesión
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
