<div class="min-h-screen flex items-center justify-center p-4 md:p-8 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
  <div class="w-full max-w-md">
    
    <!-- Logo / Brand Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-primary-500 to-emerald-400 shadow-lg shadow-primary-500/20 mb-4 animate-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8 text-slate-950" width="32" height="32">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 0 0 .495-7.467 5.99 5.99 0 0 0-1.925 3.546 5.974 5.974 0 0 1-2.133-1A3.75 3.75 0 0 0 12 18Z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl">
        Padel<span class="bg-gradient-to-r from-primary-400 to-emerald-400 bg-clip-text text-transparent">App</span>
      </h1>
      <p class="mt-2 text-sm text-slate-400">
        Gestión profesional de canchas de pádel
      </p>
    </div>

    <!-- Error Banner -->
    <div *ngIf="errorMessage()" 
         class="mb-6 p-4 rounded-xl bg-red-950/50 border border-red-800 text-red-200 text-sm flex items-start space-x-3 shadow-lg animate-fade-in"
         id="login-error-banner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-red-400 shrink-0 mt-0.5">
        <path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.401 3.003ZM12 8.25a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V9a.75.75 0 0 1 .75-.75Zm0 8.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd" />
      </svg>
      <span>{{ errorMessage() }}</span>
    </div>

    <!-- Login Card -->
    <div class="backdrop-blur-md bg-slate-900/60 border border-slate-800/80 rounded-3xl p-6 sm:p-10 shadow-2xl">
      <h2 class="text-xl font-bold text-white mb-6">Iniciar Sesión</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Email Input -->
        <div>
          <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
            Correo Electrónico
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
              </svg>
            </span>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="nombre@ejemplo.com"
              class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-3 pl-10 pr-4 text-sm transition duration-200 outline-none"
              [class.border-red-500]="isFieldInvalid('email')"
              [class.focus:ring-red-500]="isFieldInvalid('email')"
              [class.focus:border-red-500]="isFieldInvalid('email')"
            />
          </div>
          <p *ngIf="isFieldInvalid('email')" class="mt-1.5 text-xs text-red-400">
            Debe ingresar un correo electrónico válido.
          </p>
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
            Contraseña
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
              </svg>
            </span>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="w-full bg-slate-950/60 border border-slate-800 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-white rounded-xl py-3 pl-10 pr-4 text-sm transition duration-200 outline-none"
              [class.border-red-500]="isFieldInvalid('password')"
              [class.focus:ring-red-500]="isFieldInvalid('password')"
              [class.focus:border-red-500]="isFieldInvalid('password')"
            />
          </div>
          <p *ngIf="isFieldInvalid('password')" class="mt-1.5 text-xs text-red-400">
            La contraseña debe tener al menos 6 caracteres.
          </p>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full relative flex items-center justify-center py-3.5 px-4 rounded-xl text-slate-950 font-bold bg-gradient-to-r from-primary-400 to-emerald-400 hover:from-primary-300 hover:to-emerald-300 active:scale-98 transition duration-200 disabled:opacity-50 disabled:scale-100 disabled:cursor-not-allowed shadow-lg shadow-primary-500/10 cursor-pointer"
        >
          <span *ngIf="!isLoading()">Ingresar</span>
          <span *ngIf="isLoading()" class="flex items-center space-x-2">
            <!-- Loading Spinner -->
            <svg class="animate-spin h-5 w-5 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Verificando...</span>
          </span>
        </button>
      </form>

      <!-- Navigation Link -->
      <div class="mt-6 text-center">
        <p class="text-xs text-slate-400">
          ¿No tenés cuenta? 
          <a routerLink="/auth/registro" class="text-primary-400 hover:text-primary-300 hover:underline font-semibold transition duration-150 cursor-pointer">
            Registrate ahora
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
