spring:
  application:
    name: padelapp-backend
  profiles:
    active: dev # Perfil por defecto en desarrollo local
  jackson:
    serialization:
      write_dates_as_timestamps: false
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

jwt:
  secret: ${JWT_SECRET}
  # 4h por defecto (antes 24h): el token vive en localStorage en el frontend (vulnerable a robo
  # vía XSS), así que se acota la ventana de uso de un token robado mientras no exista refresh token.
  expiration: ${JWT_EXPIRATION:14400000}

mercadopago:
  access-token: ${MP_ACCESS_TOKEN}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
